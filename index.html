<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 跑步姿態分析系統 | RunAnalyzer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- MediaPipe Pose -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <div class="logo">
                <h1>RunAnalyzer <span>AI</span></h1>
            </div>
            <div class="view-switcher">
                <span class="label">分析視角：</span>
                <button id="btn-front-view" class="view-btn active">正面 (Front)</button>
                <button id="btn-side-view" class="view-btn">側面 (Side)</button>
            </div>
        </header>

        <main class="main-content">
            <section class="video-section">
                <div class="video-container">
                    <div id="upload-placeholder" class="upload-placeholder">
                        <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                        </svg>
                        <p>點擊或拖曳上傳跑步影片 (MP4, MOV)</p>
                        <input type="file" id="video-upload" accept="video/*" />
                    </div>

                    <video id="source-video" playsinline muted></video>
                    <canvas id="output-canvas"></canvas>

                    <div class="loading-overlay" id="loading-overlay" style="display: none;">
                        <div class="spinner"></div>
                        <p>AI 模型載入與分析中...</p>
                    </div>
                </div>

                <div class="controls-panel">
                    <div class="playback-controls">
                        <button id="btn-play-pause" class="control-btn play-btn" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                class="icon">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </button>
                        <button id="btn-prev-frame" class="control-btn" title="上一幀" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                class="icon">
                                <path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z" />
                            </svg>
                        </button>
                        <button id="btn-next-frame" class="control-btn" title="下一幀" disabled>
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                class="icon">
                                <path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z" />
                            </svg>
                        </button>
                        <div class="speed-control">
                            <label for="playback-speed">播放速度</label>
                            <select id="playback-speed" disabled>
                                <option value="1.0">1.0x (正常)</option>
                                <option value="0.5">0.5x (慢動作)</option>
                                <option value="0.25">0.25x (極慢)</option>
                                <option value="0.1">0.1x (逐幀分析)</option>
                            </select>
                        </div>
                    </div>
                    <div class="setting-control"
                        style="display: flex; align-items: center; gap: 10px; margin: 10px 0; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px;">
                        <label for="ground-offset" style="color: var(--text-muted); font-size: 0.9rem;">手動調整地板線:</label>
                        <input type="range" id="ground-offset" min="0" max="1" value="0.85" step="0.005"
                            style="flex: 1; cursor: pointer;">
                        <span id="ground-offset-val"
                            style="color: var(--primary); font-family: monospace; width: 45px; text-align: right;">85%</span>
                    </div>
                    <div class="progress-container">
                        <input type="range" id="video-progress" min="0" max="100" value="0" disabled>
                        <div class="time-display">
                            <span id="current-time">00:00.00</span> / <span id="duration">00:00.00</span>
                        </div>
                    </div>
                    <div class="canvas-tools"
                        style="display: flex; gap: 8px; margin-top: 12px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; flex-wrap: wrap;">
                        <span
                            style="color: var(--text-muted); font-size: 0.9rem; margin-right: 4px; align-self: center;">手動標註與測量:</span>
                        <button id="btn-tool-none" class="action-btn active"
                            style="padding: 4px 10px; font-size: 0.8rem;">無</button>
                        <button id="btn-tool-angle" class="action-btn"
                            style="padding: 4px 10px; font-size: 0.8rem; background: rgba(255,255,255,0.1);">量角器
                            (3點)</button>
                        <button id="btn-tool-plumb" class="action-btn"
                            style="padding: 4px 10px; font-size: 0.8rem; background: rgba(255,255,255,0.1);">牽垂線
                            (1點)</button>
                        <button id="btn-tool-calibrate" class="action-btn"
                            style="padding: 4px 10px; font-size: 0.8rem; background: rgba(255,255,255,0.1); border: 1px solid var(--primary);">空間校正
                            (2點)</button>
                        <button id="btn-tool-measure" class="action-btn"
                            style="padding: 4px 10px; font-size: 0.8rem; background: rgba(255,255,255,0.1);">測量距離
                            (2點)</button>
                        <button id="btn-tool-clear" class="action-btn"
                            style="padding: 4px 10px; font-size: 0.8rem; background: rgba(255,255,255,0.1); margin-left: auto;">清除標註</button>
                    </div>
                </div>
            </section>

            <section class="analysis-section">
                <div class="panel-header">
                    <div class="header-titles" style="display: flex; flex-direction: column; gap: 6px;">
                        <h2 style="margin: 0;">即時分析數據</h2>
                        <div id="gait-phase-badge" class="phase-badge">等待影片...</div>
                    </div>
                    <div class="header-actions" style="display: flex; gap: 8px;">
                        <button id="btn-export-csv" class="action-btn"
                            style="background: rgba(255, 255, 255, 0.1); box-shadow: none;" disabled>匯出 CSV</button>
                        <button id="btn-generate-report" class="action-btn" disabled>產生完整報告</button>
                    </div>
                </div>

                <div class="metrics-grid" id="metrics-grid">
                    <!-- Metrics will be injected here via JS -->
                    <div class="metric-card placeholder">
                        等待影片載入並開始分析...
                    </div>
                </div>

                <div class="report-container" id="report-container" style="display: none;">
                    <h3>AI 診斷報告</h3>
                    <div class="report-content" id="report-content">
                        <!-- Report details here -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
